<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ENGINE_NAME}} - Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="audio-unlock">
    <h2>CLICK ANYWHERE TO ENABLE WEB AUDIO</h2>
    <p>(Only required if running remotely without OpenAL)</p>
</div>

<div id="overlay">
    <h1 style="color:#ff3366; text-shadow: 0 0 20px #ff3366; font-size: 50px;">ENGINE CLOSED</h1>
    <p>This tab can be safely closed...</p>
</div>
<div id="status">PAUSED</div>
<h1>{{ENGINE_NAME}}</h1>

<div class="container" id="bars-container"></div>

<div class="progress-wrapper">
    <div class="progress-container">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="time-text" id="time-text">00:00 / 00:00</div>
</div>

<div class="stats">
    <div class="stat-box">
        <div class="stat-title">GLOBAL ENERGY</div>
        <div class="stat-value" id="energy-val">0%</div>
    </div>

    <div class="stat-box" style="min-width: 250px;">
        <div class="stat-title">MULTI-BAND BEAT MONITOR</div>
        <div class="rhythm-panel">
            <div id="kick-text" class="rhythm-indicator">KICK</div>
            <div id="snare-text" class="rhythm-indicator">SNARE</div>
            <div id="hat-text" class="rhythm-indicator">HAT</div>
        </div>
    </div>

    <div class="stat-box">
        <div class="stat-title">HIT STREAK</div>
        <div class="stat-value" id="combo-val" style="color:#ff007f;">0x</div>
    </div>
    <div class="stat-box">
        <div class="stat-title">SPEED</div>
        <div class="stat-value" id="speed-val">1.00x</div>
    </div>
</div>

<div class="vol-cont">
    <span class="stat-title">VOLUME</span>
    <label for="vol-slider"></label>
    <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.1">
    <span id="vol-label" class="stat-value" style="font-size: 16px; min-width: 45px;">10%</span>
</div>

<script src="script.js"></script>
</body>
</html>
